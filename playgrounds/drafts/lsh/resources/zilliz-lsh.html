s="detailHead_iconWrapper__MtztT"><svg width="6" height="10" viewBox="0 0 6 10" fill="none" xmlns="http://www.w3.org/2000/svg"><path opacity="0.6" d="M1.6625e-08 1.03866C9.919e-09 0.619699 0.484383 0.386523 0.811863 0.647842L5.77613 4.60918C6.02698 4.80935 6.02698 5.19065 5.77613 5.39082L0.811864 9.35216C0.484383 9.61348 1.50143e-07 9.3803 1.43437e-07 8.96134L1.6625e-08 1.03866Z" fill="white"></path></svg></span><a target="_self" href="/learn/mamba-architecture-potential-transformer-replacement">The Potential Transformer Replacement: Mamba</a></li><li class="detailHead_listItem___5wTj"><span class="detailHead_iconWrapper__MtztT"><svg width="6" height="10" viewBox="0 0 6 10" fill="none" xmlns="http://www.w3.org/2000/svg"><path opacity="0.6" d="M1.6625e-08 1.03866C9.919e-09 0.619699 0.484383 0.386523 0.811863 0.647842L5.77613 4.60918C6.02698 4.80935 6.02698 5.19065 5.77613 5.39082L0.811864 9.35216C0.484383 9.61348 1.50143e-07 9.3803 1.43437e-07 8.96134L1.6625e-08 1.03866Z" fill="white"></path></svg></span><a target="_self" href="/learn/align-explained-scaling-up-visual-and-vision-language-representation-learning-with-noisy-text-supervision">ALIGN Explained: Scaling Up Visual and Vision-Language Representation Learning With Noisy Text Supervision</a></li></ul></div></div></div></div></div><div class="page_container__IibMw"><div class="learnDetail_contentContainer__xRjX3"><div class="learnDetail_docContent__s44U3"><div class="docContainer blogContainer"><p>In the era of big data and machine learning, efficiently finding nearest neighbors or similar items in large, high-dimensional datasets is a fundamental challenge across many applications. Take a music streaming service like Spotify, for example. To provide personalized song recommendations, it needs to quickly identify tracks most similar to a user’s preferences from a massive library of millions of songs, each represented by hundreds of attributes like audio features, lyrics, genres, etc. This is a high-dimensional <a href="https://zilliz.com/glossary/anns">approximate nearest-neighbor</a> search problem.</p>
<p>Traditional techniques like linear scans, space-partitioning tree methods, or hash tables become computationally prohibitive as the number of dimensions and data points increases. This is where an approach called <a href="https://zilliz.com/learn/mastering-locality-sensitive-hashing-a-comprehensive-tutorial">Locality Sensitive Hashing</a> (LSH) and, sometimes, hash-based indexes comes into play. LSH is an approximate technique that can drastically enhance the efficiency of similarity search in high dimensions by intelligently mapping similar data points to the same buckets or locations with high probability. This allows you to explore only a small subset of candidates instead of exhaustively comparing against the entire dataset.</p>
<h2 id="The-Essence-and-Challenges-of-Similarity-Search-in-High-Dimensional-Data" class="common-anchor-header">The Essence and Challenges of Similarity Search in High Dimensional Data<button data-href="#The-Essence-and-Challenges-of-Similarity-Search-in-High-Dimensional-Data" class="anchor-icon" translate="no">
      <svg
        aria-hidden="true"

        ></path>
      </svg>
    </button></h2><p><a href="https://zilliz.com/blog/similarity-metrics-for-vector-search">Similarity</a> or <a href="https://zilliz.com/learn/vector-similarity-search">vector similarity search</a> is a technique in information retrieval and data-driven applications. The goal is to identify items or data points resembling a given <a href="https://zilliz.com/learn/advanced-querying-techniques-in-vector-databases">query vector</a> by comparing their spatial distance in the high-dimensional space.</p>
<p>This technique plays a role across numerous use cases. For instance, in e-commerce, similarity search powers product recommendation engines, offering customers choices aligned with their preferences, thereby enriching the shopping experience. In multimedia services, it enables retrieving images, videos, or music that resonate with specific patterns or themes, enhancing content discoverability and user engagement. However, similarity search presents significant computational challenges, particularly in handling large and high-dimensional datasets. Traditional brute-force methods compare each data point with every other point, impractically time-consuming due to their quadratic time complexity, especially in big data contexts. Consequently, we need an efficient approach to swiftly pinpoint similar items without requiring exhaustive pairwise comparisons, streamlining the search process in extensive datasets. Locality Sensitive Hashing (LSH) addresses this by increasing the likelihood of hash value collisions for similar inputs, grouping them into hash bins and thus improving the efficiency of similarity searches.</p>
<h2 id="What-is-Locality-Sensitive-Hashing-LSH" class="common-anchor-header">What is Locality-Sensitive Hashing (LSH)?<button data-href="#What-is-Locality-Sensitive-Hashing-LSH" class="anchor-icon" translate="no">
      <svg
        aria-hidden="true"
        focusable="false"
        height="20"
        version="1.1"
        viewBox="0 0 16 16"
        width="16"
      >
        <path
          fill="#0092E4"
          fill-rule="evenodd"
          d="M4 9h1v1H4c-1.5 0-3-1.69-3-3.5S2.55 3 4 3h4c1.45 0 3 1.69 3 3.5 0 1.41-.91 2.72-2 3.25V8.59c.58-.45 1-1.27 1-2.09C10 5.22 8.98 4 8 4H4c-.98 0-2 1.22-2 2.5S3 9 4 9zm9-3h-1v1h1c1 0 2 1.22 2 2.5S13.98 12 13 12H9c-.98 0-2-1.22-2-2.5 0-.83.42-1.64 1-2.09V6.25c-1.09.53-2 1.84-2 3.25C6 11.31 7.55 13 9 13h4c1.45 0 3-1.69 3-3.5S14.5 6 13 6z"
        ></path>
      </svg>
    </button></h2><p><strong>Locality-Sensitive Hashing (LSH)</strong>, introduced by Indyk-Motwani in 1998, is a technique used in approximate nearest neighbor (<a href="https://zilliz.com/blog/ANN-machine-learning">ANN</a>) searches that underpins and accelerates the efficiency of similarity searches. Unlike conventional hashing, which mainly focuses on mapping each data point, LSH groups similar data points together. This is enabled by its “locality sensitivity,” which ensures that close points in the original data spaces would end up in the same location, also referred to as a “bucket.”</p>

  </span>
</p>
<p>As LSH groups similar data types across datasets using multiple hash functions, the similarity search is narrowed down quickly. It does this by focusing on potentially relevant data points closer together in the high-dimensional space, speeding up the searches. Random hash functions play a crucial role in ensuring consistent performance across various datasets. Randomly chosen hash functions improve performance by applying probabilistic guarantees equally to all datasets. This approach makes it useful for applications like nearest-neighbor search for <a href="https://zilliz.com/vector-database-use-cases/recommender-system">recommender systems</a>, duplicate detection, and more.</p>

    </button></h2><p>Local Sensitivity Hashing operates in three major steps: <strong>Shingling</strong>, <strong>Minhashing</strong>, and <strong>Locality Sensitive Hashing.</strong> In this process, data points with the same hash code are grouped together in hash buckets, facilitating efficient querying by allowing similar items to be quickly located and examined based on their shared hash codes.</p>

<h3 id="Shingling" class="common-anchor-header"><strong>Shingling</strong><button data-href="#Shingling" class="anchor-icon" translate="no">

        ></path>
      </svg>
    </button></h3><p>This step focuses on converting the documents into a set of characters of length k (also known as k-shingles or k-grams). This conversion allows you to represent the documents to be compared based on set <a href="https://docs.zilliz.com/docs/search-metrics-explained">similarity metrics</a>, such as Jaccard similarity.</p>
<h3 id="Minhashing" class="common-anchor-header"><strong>Minhashing</strong><button data-href="#Minhashing" class="anchor-icon" translate="no">

        ></path>
      </svg>
    </button></h3><p>This technique studies the similarity between two data sets by assigning Minhash signatures and comparing them. Signatures are used to compare these sets because they capture the essence of the document’s content in a shorter form. This is the step where the Jaccard index is used. The Jaccard index of two sets is the number of common elements divided by the length of all the elements.</p>
<h3 id="LSH-technique" class="common-anchor-header"><strong>LSH technique</strong><button data-href="#LSH-technique" class="anchor-icon" translate="no">

        ></path>
      </svg>
    </button></h3><p>This step includes clustering similar items together. Random projections are a technique used to reduce the dimensionality of a set of points. The LSH technique uses multiple random projection functions to map the document signatures into a lower-dimensional space. This wraps up the process because the random projections are designed so that similar documents and signatures will likely be mapped into the same bucket. Similar documents are likely to be mapped to the same hash value, facilitating efficient querying.</p>
<h2 id="Implementing-LSH" class="common-anchor-header">Implementing LSH<button data-href="#Implementing-LSH" class="anchor-icon" translate="no">

        ></path>
      </svg>
    </button></h2><p>To implement LSH, you can use a few steps we have included in the following code snippets.</p>
<p>Using a single hash function in high-dimensional spaces can lead to less flexible results and poorer performance in identifying approximate neighbors. Instead, utilizing multiple hash functions can improve lookup accuracy for similar items.</p>
<p>Start by including the following libraries.</p>
<pre><code class="language-python"><span class="hljs-keyword">import</span> numpy <span class="hljs-keyword">as</span> np

<button class="copy-code-btn"></button></code></pre>
<p>Once you’re done with that, you can define the hash function.</p>
<pre><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">hash_function</span>(<span class="hljs-params">datapoint, random_vector</span>):
  <span class="hljs-string">&quot;&quot;&quot;
  Hashes a datapoint using a random projection vector.


  Args:
      datapoint: A NumPy array representing the datapoint.
      random_vector: A NumPy array representing the random projection vector.


  Returns:
      A single-bit hash value (0 or 1).
  &quot;&quot;&quot;</span>
  projection = np.dot(datapoint, random_vector)
  <span class="hljs-keyword">return</span> <span class="hljs-number">1</span> <span class="hljs-keyword">if</span> projection &gt;= <span class="hljs-number">0</span> <span class="hljs-keyword">else</span> <span class="hljs-number">0</span>
<button class="copy-code-btn"></button></code></pre>
<p>This function takes a datapoint and a random projection vector as input. It calculates the dot product between them, and if the projection is non-negative, it returns 1. Otherwise, it returns 0. This process creates a single-bit hash value depending on the relationship between the data point and the random vector.</p>
<p>Generate a random projection matrix.</p>
<pre><code>def <span class="hljs-built_in">generate_random_matrix</span>(num_projections, data_dim):
<span class="hljs-comment">/*
  Generates a random projection matrix with specified dimensions.


  Args:
      num_projections: Number of random projection vectors to generate.
      data_dim: Dimensionality of the datapoints.


  Returns:
      A NumPy array representing the random projection matrix.
*/</span>
  return np.random.<span class="hljs-built_in">randn</span>(num_projections, data_dim)

<button class="copy-code-btn"></button></code></pre>
<p>More specifically, let’s discuss the role of this function.
The <code>num_projections</code> is an integer that details how many random projection vectors you’d want to create, while the <code>data_dim</code> is another integer that shows the dimensionality of your data points.</p>
<p>Overall, this function generates a matrix where each row is a random projection vector you can use later on to project your high dimensional data points into a lower dimensional space, preparing it for the next function, Local Sensitive Hashing.</p>
<p>Start to operate local sensitive hashing.</p>
<pre><code><span class="hljs-keyword">def</span> <span class="hljs-title function_">lsh_hash</span>(<span class="hljs-params">datapoint, random_matrix</span>):
  <span class="hljs-string">&quot;&quot;&quot;
  Hashes a datapoint using multiple random projections.


  Args:
      datapoint: A NumPy array representing the datapoint.
      random_matrix: A NumPy array representing the random projection matrix.


  Returns:
      A list of hash values (one for each random projection vector).
  &quot;&quot;&quot;</span>
  hash_values = []
  <span class="hljs-keyword">for</span> random_vector <span class="hljs-keyword">in</span> random_matrix:
    hash_values.append(hash_function(datapoint, random_vector))
  <span class="hljs-keyword">return</span> hash_values

<button class="copy-code-btn"></button></code></pre>
<p>The <code>ish_hash</code>  function hashes a data point using multiple random projections, a core step in the LSH process.
The first line includes the NumPy arrays <code>datapoint</code> and <code>random_matrix</code>, which represent the datapoint to be hashed and the random projection matrix for hashing, respectively.</p>
<p>Moving on to the process steps, the initialization step is executed by <code>hash_values</code>, which creates an empty list to store the generated hash values.</p>
<p>This is followed by the iteration process, which is done through random projection vectors. The random_matrix loops through each row, and then the <code>random_vector</code> calls the <code>hash_function</code>  with the <code>datapoint</code> and <code>random_vector</code>  as arguments.</p>
<p>Then you’ll get the return values in the <code>hash_values</code> list, containing a hash value for each random projection vector.</p>
<pre><code class="language-python"><span class="hljs-comment"># Sample datapoint</span>
datapoint = np.array([<span class="hljs-number">1</span>, <span class="hljs-number">2</span>, <span class="hljs-number">3</span>])


<span class="hljs-comment"># Number of random projections</span>
num_projections = <span class="hljs-number">2</span>


<span class="hljs-comment"># Dimensionality of datapoints</span>
data_dim = <span class="hljs-built_in">len</span>(datapoint)


<span class="hljs-comment"># Generate random projection matrix</span>
random_matrix = generate_random_matrix(num_projections, data_dim)


<span class="hljs-comment"># Hash the datapoint</span>
hash_values = lsh_hash(datapoint, random_matrix)


<span class="hljs-comment"># Print the hash values</span>
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;LSH Hash:&quot;</span>, hash_values)

<button class="copy-code-btn"></button></code></pre>
<p>This code snippet generates a sample data point. It defines the number of random projections and data dimensionality, generates a random projection matrix, hashes the data point, and prints the hash values in 1s and 0s.</p>
<h2 id="LSH-Applications-and-Use-Cases" class="common-anchor-header">LSH Applications and Use Cases<button data-href="#LSH-Applications-and-Use-Cases" class="anchor-icon" translate="no">

        ></path>
      </svg>
    </button></h2><p>LSH was designed to effectively and efficiently conduct similarity searches, which gives them a range of applications in various fields.
One of its most applied use cases is in computational biology, specifically in gene and protein sequence analysis. This is because LSH can help identify similar gene expressions in genome <a href="https://zilliz.com/glossary/ai-database">databases</a>, especially since gene expression data often has high dimensions.</p>
<p>Another widely used application of LSH is image retrieval. the LSH function maps out high-dimensional image data to lower representations while maintaining the similarity between data. This facilitates fast retrieval of images similar to a query image. This applies to stock photo services, where users request certain visuals, medical image analysis, where finding a similar case could help with diagnosis, and more. It has also improved hashing techniques and compression performance in image retrieval applications. LSH is also used in plagiarism detection software. It helps identify the similarity between documents, often with a percentage and highlighting the similar areas. LSH has other applications, such as video retrieval, social network analysis, recommendation systems, and data mining, all owing to its ability to spot similarities between datasets.</p>

      </svg>
    </button></h2><p>Local Sensitivity Hashing (LSH) is a pivotal technique for tackling the complexities of large, high-dimensional datasets, streamlining the process of similarity search and data retrieval. Its capacity to efficiently map similar data points to the same 'buckets' in a reduced-dimensional search space, makes it an invaluable tool in various sectors. From powering recommendation systems in e-commerce to facilitating advanced research in computational biology, LSH's role in enhancing search efficiency and accuracy is undeniable.</p>

"createdAt":"2025-03-19T11:32:59.670Z","updatedAt":"2025-03-19T11:32:59.670Z","publishedAt":"2021-01-21T10:28:39.896Z","locale":"pt"},{"id":93,"name":"Инженерия","createdAt":"2025-03-19T11:35:18.007Z","updatedAt":"2025-03-19T11:35:18.007Z","publishedAt":"2021-01-21T10:28:39.896Z","locale":"ru"},{"id":97,"name":"엔지니어링","createdAt":"2025-03-19T11:37:34.787Z","updatedAt":"2025-03-19T11:37:34.787Z","publishedAt":"2021-01-21T10:28:39.896Z","locale":"ko"},{"id":101,"name":"Ingegneria","createdAt":"2025-03-19T11:40:00.418Z","updatedAt":"2025-03-19T11:40:00.418Z","publishedAt":"2021-01-21T10:28:39.896Z","locale":"it"},{"id":105,"name":"Ingénierie","createdAt":"2025-03-19T11:44:19.505Z","updatedAt":"2025-03-19T11:44:19.505Z","publishedAt":"2021-01-21T10:28:39.896Z","locale":"fr"}]}],"articleContent":"\u003cp\u003eIn the era of big data and machine learning, efficiently finding nearest neighbors or similar items in large, high-dimensional datasets is a fundamental challenge across many applications. Take a music streaming service like Spotify, for example. To provide personalized song recommendations, it needs to quickly identify tracks most similar to a user’s preferences from a massive library of millions of songs, each represented by hundreds of attributes like audio features, lyrics, genres, etc. This is a high-dimensional \u003ca href=\"https://zilliz.com/glossary/anns\"\u003eapproximate nearest-neighbor\u003c/a\u003e search problem.\u003c/p\u003e\n\u003cp\u003eTraditional techniques like linear scans, space-partitioning tree methods, or hash tables become computationally prohibitive as the number of dimensions and data points increases. This is where an approach called \u003ca href=\"https://zilliz.com/learn/mastering-locality-sensitive-hashing-a-comprehensive-tutorial\"\u003eLocality Sensitive Hashing\u003c/a\u003e (LSH) and, sometimes, hash-based indexes comes into play. LSH is an approximate technique that can drastically enhance the efficiency of similarity search in high dimensions by intelligently mapping similar data points to the same buckets or locations with high probability. This allows you to explore only a small subset of candidates instead of exhaustively comparing against the entire dataset.\u003c/p\u003e\n\u003ch2 id=\"The-Essence-and-Challenges-of-Similarity-Search-in-High-Dimensional-Data\" class=\"common-anchor-header\"\u003eThe Essence and Challenges of Similarity Search in High Dimensional Data\u003cbutton data-href=\"#The-Essence-and-Challenges-of-Similarity-Search-in-High-Dimensional-Data\" class=\"anchor-icon\" translate=\"no\"\u003e\n      \u003csvg\n        aria-hidden=\"true\"\n        focusable=\"false\"\n        height=\"20\"\n        version=\"1.1\"\n        viewBox=\"0 0 16 16\"\n        width=\"16\"\n      \u003e\n        \u003cpath\n          fill=\"#0092E4\"\n          fill-rule=\"evenodd\"\n          d=\"M4 9h1v1H4c-1.5 0-3-1.69-3-3.5S2.55 3 4 3h4c1.45 0 3 1.69 3 3.5 0 1.41-.91 2.72-2 3.25V8.59c.58-.45 1-1.27 1-2.09C10 5.22 8.98 4 8 4H4c-.98 0-2 1.22-2 2.5S3 9 4 9zm9-3h-1v1h1c1 0 2 1.22 2 2.5S13.98 12 13 12H9c-.98 0-2-1.22-2-2.5 0-.83.42-1.64 1-2.09V6.25c-1.09.53-2 1.84-2 3.25C6 11.31 7.55 13 9 13h4c1.45 0 3-1.69 3-3.5S14.5 6 13 6z\"\n        \u003e\u003c/path\u003e\n      \u003c/svg\u003e\n    \u003c/button\u003e\u003c/h2\u003e\u003cp\u003e\u003ca href=\"https://zilliz.com/blog/similarity-metrics-for-vector-search\"\u003eSimilarity\u003c/a\u003e or \u003ca href=\"https://zilliz.com/learn/vector-similarity-search\"\u003evector similarity search\u003c/a\u003e is a technique in information retrieval and data-driven applications. The goal is to identify items or data points resembling a given \u003ca href=\"https://zilliz.com/learn/advanced-querying-techniques-in-vector-databases\"\u003equery vector\u003c/a\u003e by comparing their spatial distance in the high-dimensional space.\u003c/p\u003e\n\u003cp\u003eThis technique plays a role across numerous use cases. For instance, in e-commerce, similarity search powers product recommendation engines, offering customers choices aligned with their preferences, thereby enriching the shopping experience. In multimedia services, it enables retrieving images, videos, or music that resonate with specific patterns or themes, enhancing content discoverability and user engagement. However, similarity search presents significant computational challenges, particularly in handling large and high-dimensional datasets. Traditional brute-force methods compare each data point with every other point, impractically time-consuming due to their quadratic time complexity, especially in big data contexts. Consequently, we need an efficient approach to swiftly pinpoint similar items without requiring exhaustive pairwise comparisons, streamlining the search process in extensive datasets. Locality Sensitive Hashing (LSH) addresses this by increasing the likelihood of hash value collisions for similar inputs, grouping them into hash bins and thus improving the efficiency of similarity searches.\u003c/p\u003e\n\u003ch2 id=\"What-is-Locality-Sensitive-Hashing-LSH\" class=\"common-anchor-header\"\u003eWhat is Locality-Sensitive Hashing (LSH)?\u003cbutton data-href=\"#What-is-Locality-Sensitive-Hashing-LSH\" class=\"anchor-icon\" translate=\"no\"\u003e\n      \u003csvg\n        aria-hidden=\"true\"\n        focusable=\"false\"\n        height=\"20\"\n        version=\"1.1\"\n        viewBox=\"0 0 16 16\"\n        width=\"16\"\n      \u003e\n        \u003cpath\n          fill=\"#0092E4\"\n          fill-rule=\"evenodd\"\n          d=\"M4 9h1v1H4c-1.5 0-3-1.69-3-3.5S2.55 3 4 3h4c1.45 0 3 1.69 3 3.5 0 1.41-.91 2.72-2 3.25V8.59c.58-.45 1-1.27 1-2.09C10 5.22 8.98 4 8 4H4c-.98 0-2 1.22-2 2.5S3 9 4 9zm9-3h-1v1h1c1 0 2 1.22 2 2.5S13.98 12 13 12H9c-.98 0-2-1.22-2-2.5 0-.83.42-1.64 1-2.09V6.25c-1.09.53-2 1.84-2 3.25C6 11.31 7.55 13 9 13h4c1.45 0 3-1.69 3-3.5S14.5 6 13 6z\"\n        \u003e\u003c/path\u003e\n      \u003c/svg\u003e\n    \u003c/button\u003e\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eLocality-Sensitive Hashing (LSH)\u003c/strong\u003e, introduced by Indyk-Motwani in 1998, is a technique used in approximate nearest neighbor (\u003ca href=\"https://zilliz.com/blog/ANN-machine-learning\"\u003eANN\u003c/a\u003e) searches that underpins and accelerates the efficiency of similarity searches. Unlike conventional hashing, which mainly focuses on mapping each data point, LSH groups similar data points together. This is enabled by its “locality sensitivity,” which ensures that close points in the original data spaces would end up in the same location, also referred to as a “bucket.”\u003c/p\u003e\n\u003cp\u003e\n  \u003cspan class=\"img-wrapper\"\u003e\n    \u003cimg src=\"https://assets.zilliz.com/LSH_vs_Regular_Hashing_b8bd08a337.png\" alt=\"LSH vs Regular Hashing\" class=\"doc-image\" id=\"lsh-vs-regular-hashing\" /\u003e\n    \u003cspan\u003eLSH vs Regular Hashing\u003c/span\u003e\n  \u003c/span\u003e\n\u003c/p\u003e\n\u003cp\u003eAs LSH groups similar data types across datasets using multiple hash functions, the similarity search is narrowed down quickly. It does this by focusing on potentially relevant data points closer together in the high-dimensional space, speeding up the searches. Random hash functions play a crucial role in ensuring consistent performance across various datasets. Randomly chosen hash functions improve performance by applying probabilistic guarantees equally to all datasets. This approach makes it useful for applications like nearest-neighbor search for \u003ca href=\"https://zilliz.com/vector-database-use-cases/recommender-system\"\u003erecommender systems\u003c/a\u003e, duplicate detection, and more.\u003c/p\u003e\n\u003ch2 id=\"How-Does-LSH-Work\" class=\"common-anchor-header\"\u003eHow Does LSH Work?\u003cbutton data-href=\"#How-Does-LSH-Work\" class=\"anchor-icon\" translate=\"no\"\u003e\n      \u003csvg\n        aria-hidden=\"true\"\n        focusable=\"false\"\n        height=\"20\"\n        version=\"1.1\"\n        viewBox=\"0 0 16 16\"\n        width=\"16\"\n      \u003e\n        \u003cpath\n          fill=\"#0092E4\"\n          fill-rule=\"evenodd\"\n          d=\"M4 9h1v1H4c-1.5 0-3-1.69-3-3.5S2.55 3 4 3h4c1.45 0 3 1.69 3 3.5 0 1.41-.91 2.72-2 3.25V8.59c.58-.45 1-1.27 1-2.09C10 5.22 8.98 4 8 4H4c-.98 0-2 1.22-2 2.5S3 9 4 9zm9-3h-1v1h1c1 0 2 1.22 2 2.5S13.98 12 13 12H9c-.98 0-2-1.22-2-2.5 0-.83.42-1.64 1-2.09V6.25c-1.09.53-2 1.84-2 3.25C6 11.31 7.55 13 9 13h4c1.45 0 3-1.69 3-3.5S14.5 6 13 6z\"\n        \u003e\u003c/path\u003e\n      \u003c/svg\u003e\n    \u003c/button\u003e\u003c/h2\u003e\u003cp\u003eLocal Sensitivity Hashing operates in three major steps: \u003cstrong\u003eShingling\u003c/strong\u003e, \u003cstrong\u003eMinhashing\u003c/strong\u003e, and \u003cstrong\u003eLocality Sensitive Hashing.\u003c/strong\u003e In this process, data points with the same hash code are grouped together in hash buckets, facilitating efficient querying by allowing similar items to be quickly located and examined based on their shared hash codes.\u003c/p\u003e\n\u003cp\u003e\n  \u003cspan class=\"img-wrapper\"\u003e\n    \u003cimg src=\"https://assets.zilliz.com/The_key_steps_of_an_LSH_algorithm_35385d105e.png\" alt=\"The key steps of an LSH algorithm\" class=\"doc-image\" id=\"the-key-steps-of-an-lsh-algorithm\" /\u003e\n    \u003cspan\u003eThe key steps of an LSH algorithm\u003c/span\u003e\n  \u003c/span\u003e\n\u003c/p\u003e\n\u003ch3 id=\"Shingling\" class=\"common-anchor-header\"\u003e\u003cstrong\u003eShingling\u003c/strong\u003e\u003cbutton data-href=\"#Shingling\" class=\"anchor-icon\" translate=\"no\"\u003e\n      \u003csvg\n        aria-hidden=\"true\"\n        focusable=\"false\"\n        height=\"20\"\n        version=\"1.1\"\n        viewBox=\"0 0 16 16\"\n        width=\"16\"\n      \u003e\n        \u003cpath\n          fill=\"#0092E4\"\n          fill-rule=\"evenodd\"\n          d=\"M4 9h1v1H4c-1.5 0-3-1.69-3-3.5S2.55 3 4 3h4c1.45 0 3 1.69 3 3.5 0 1.41-.91 2.72-2 3.25V8.59c.58-.45 1-1.27 1-2.09C10 5.22 8.98 4 8 4H4c-.98 0-2 1.22-2 2.5S3 9 4 9zm9-3h-1v1h1c1 0 2 1.22 2 2.5S13.98 12 13 12H9c-.98 0-2-1.22-2-2.5 0-.83.42-1.64 1-2.09V6.25c-1.09.53-2 1.84-2 3.25C6 11.31 7.55 13 9 13h4c1.45 0 3-1.69 3-3.5S14.5 6 13 6z\"\n        \u003e\u003c/path\u003e\n      \u003c/svg\u003e\n    \u003c/button\u003e\u003c/h3\u003e\u003cp\u003eThis step focuses on converting the documents into a set of characters of length k (also known as k-shingles or k-grams). This conversion allows you to represent the documents to be compared based on set \u003ca href=\"https://docs.zilliz.com/docs/search-metrics-explained\"\u003esimilarity metrics\u003c/a\u003e, such as Jaccard similarity.\u003c/p\u003e\n\u003ch3 id=\"Minhashing\" class=\"common-anchor-header\"\u003e\u003cstrong\u003eMinhashing\u003c/strong\u003e\u003cbutton data-href=\"#Minhashing\" class=\"anchor-icon\" translate=\"no\"\u003e\n      \u003csvg\n        aria-hidden=\"true\"\n        focusable=\"false\"\n        height=\"20\"\n        version=\"1.1\"\n        viewBox=\"0 0 16 16\"\n        width=\"16\"\n      \u003e\n        \u003cpath\n          fill=\"#0092E4\"\n          fill-rule=\"evenodd\"\n          d=\"M4 9h1v1H4c-1.5 0-3-1.69-3-3.5S2.55 3 4 3h4c1.45 0 3 1.69 3 3.5 0 1.41-.91 2.72-2 3.25V8.59c.58-.45 1-1.27 1-2.09C10 5.22 8.98 4 8 4H4c-.98 0-2 1.22-2 2.5S3 9 4 9zm9-3h-1v1h1c1 0 2 1.22 2 2.5S13.98 12 13 12H9c-.98 0-2-1.22-2-2.5 0-.83.42-1.64 1-2.09V6.25c-1.09.53-2 1.84-2 3.25C6 11.31 7.55 13 9 13h4c1.45 0 3-1.69 3-3.5S14.5 6 13 6z\"\n        \u003e\u003c/path\u003e\n      \u003c/svg\u003e\n    \u003c/button\u003e\u003c/h3\u003e\u003cp\u003eThis technique studies the similarity between two data sets by assigning Minhash signatures and comparing them. Signatures are used to compare these sets because they capture the essence of the document’s content in a shorter form. This is the step where the Jaccard index is used. The Jaccard index of two sets is the number of common elements divided by the length of all the elements.\u003c/p\u003e\n\u003ch3 id=\"LSH-technique\" class=\"common-anchor-header\"\u003e\u003cstrong\u003eLSH technique\u003c/strong\u003e\u003cbutton data-href=\"#LSH-technique\" class=\"anchor-icon\" translate=\"no\"\u003e\n      \u003csvg\n        aria-hidden=\"true\"\n        focusable=\"false\"\n        height=\"20\"\n        version=\"1.1\"\n        viewBox=\"0 0 16 16\"\n        width=\"16\"\n      \u003e\n        \u003cpath\n          fill=\"#0092E4\"\n          fill-rule=\"evenodd\"\n          d=\"M4 9h1v1H4c-1.5 0-3-1.69-3-3.5S2.55 3 4 3h4c1.45 0 3 1.69 3 3.5 0 1.41-.91 2.72-2 3.25V8.59c.58-.45 1-1.27 1-2.09C10 5.22 8.98 4 8 4H4c-.98 0-2 1.22-2 2.5S3 9 4 9zm9-3h-1v1h1c1 0 2 1.22 2 2.5S13.98 12 13 12H9c-.98 0-2-1.22-2-2.5 0-.83.42-1.64 1-2.09V6.25c-1.09.53-2 1.84-2 3.25C6 11.31 7.55 13 9 13h4c1.45 0 3-1.69 3-3.5S14.5 6 13 6z\"\n        \u003e\u003c/path\u003e\n      \u003c/svg\u003e\n    \u003c/button\u003e\u003c/h3\u003e\u003cp\u003eThis step includes clustering similar items together. Random projections are a technique used to reduce the dimensionality of a set of points. The LSH technique uses multiple random projection functions to map the document signatures into a lower-dimensional space. This wraps up the process because the random projections are designed so that similar documents and signatures will likely be mapped into the same bucket. Similar documents are likely to be mapped to the same hash value, facilitating efficient querying.\u003c/p\u003e\n\u003ch2 id=\"Implementing-LSH\" class=\"common-anchor-header\"\u003eImplementing LSH\u003cbutton data-href=\"#Implementing-LSH\" class=\"anchor-icon\" translate=\"no\"\u003e\n      \u003csvg\n        aria-hidden=\"true\"\n        focusable=\"false\"\n        height=\"20\"\n        version=\"1.1\"\n        viewBox=\"0 0 16 16\"\n        width=\"16\"\n      \u003e\n        \u003cpath\n          fill=\"#0092E4\"\n          fill-rule=\"evenodd\"\n          d=\"M4 9h1v1H4c-1.5 0-3-1.69-3-3.5S2.55 3 4 3h4c1.45 0 3 1.69 3 3.5 0 1.41-.91 2.72-2 3.25V8.59c.58-.45 1-1.27 1-2.09C10 5.22 8.98 4 8 4H4c-.98 0-2 1.22-2 2.5S3 9 4 9zm9-3h-1v1h1c1 0 2 1.22 2 2.5S13.98 12 13 12H9c-.98 0-2-1.22-2-2.5 0-.83.42-1.64 1-2.09V6.25c-1.09.53-2 1.84-2 3.25C6 11.31 7.55 13 9 13h4c1.45 0 3-1.69 3-3.5S14.5 6 13 6z\"\n        \u003e\u003c/path\u003e\n      \u003c/svg\u003e\n    \u003c/button\u003e\u003c/h2\u003e\u003cp\u003eTo implement LSH, you can use a few steps we have included in the following code snippets.\u003c/p\u003e\n\u003cp\u003eUsing a single hash function in high-dimensional spaces can lead to less flexible results and poorer performance in identifying approximate neighbors. Instead, utilizing multiple hash functions can improve lookup accuracy for similar items.\u003c/p\u003e\n\u003cp\u003eStart by including the following libraries.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"language-python\"\u003e\u003cspan class=\"hljs-keyword\"\u003eimport\u003c/span\u003e numpy \u003cspan class=\"hljs-keyword\"\u003eas\u003c/span\u003e np\n\n\u003cbutton class=\"copy-code-btn\"\u003e\u003c/button\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eOnce you’re done with that, you can define the hash function.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"language-python\"\u003e\u003cspan class=\"hljs-keyword\"\u003edef\u003c/span\u003e \u003cspan class=\"hljs-title function_\"\u003ehash_function\u003c/span\u003e(\u003cspan class=\"hljs-params\"\u003edatapoint, random_vector\u003c/span\u003e):\n  \u003cspan class=\"hljs-string\"\u003e\u0026quot;\u0026quot;\u0026quot;\n  Hashes a datapoint using a random projection vector.\n\n\n  Args:\n      datapoint: A NumPy array representing the datapoint.\n      random_vector: A NumPy array representing the random projection vector.\n\n\n  Returns:\n      A single-bit hash value (0 or 1).\n  \u0026quot;\u0026quot;\u0026quot;\u003c/span\u003e\n  projection = np.dot(datapoint, random_vector)\n  \u003cspan class=\"hljs-keyword\"\u003ereturn\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e \u003cspan class=\"hljs-keyword\"\u003eif\u003c/span\u003e projection \u0026gt;= \u003cspan class=\"hljs-number\"\u003e0\u003c/span\u003e \u003cspan class=\"hljs-keyword\"\u003eelse\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e0\u003c/span\u003e\n\u003cbutton class=\"copy-code-btn\"\u003e\u003c/button\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eThis function takes a datapoint and a random projection vector as input. It calculates the dot product between them, and if the projection is non-negative, it returns 1. Otherwise, it returns 0. This process creates a single-bit hash value depending on the relationship between the data point and the random vector.\u003c/p\u003e\n\u003cp\u003eGenerate a random projection matrix.\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003edef \u003cspan class=\"hljs-built_in\"\u003egenerate_random_matrix\u003c/span\u003e(num_projections, data_dim):\n\u003cspan class=\"hljs-comment\"\u003e/*\n  Generates a random projection matrix with specified dimensions.\n\n\n  Args:\n      num_projections: Number of random projection vectors to generate.\n      data_dim: Dimensionality of the datapoints.\n\n\n  Returns:\n      A NumPy array representing the random projection matrix.\n*/\u003c/span\u003e\n  return np.random.\u003cspan class=\"hljs-built_in\"\u003erandn\u003c/span\u003e(num_projections, data_dim)\n\n\u003cbutton class=\"copy-code-btn\"\u003e\u003c/button\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eMore specifically, let’s discuss the role of this function.\nThe \u003ccode\u003enum_projections\u003c/code\u003e is an integer that details how many random projection vectors you’d want to create, while the \u003ccode\u003edata_dim\u003c/code\u003e is another integer that shows the dimensionality of your data points.\u003c/p\u003e\n\u003cp\u003eOverall, this function generates a matrix where each row is a random projection vector you can use later on to project your high dimensional data points into a lower dimensional space, preparing it for the next function, Local Sensitive Hashing.\u003c/p\u003e\n\u003cp\u003eStart to operate local sensitive hashing.\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003e\u003cspan class=\"hljs-keyword\"\u003edef\u003c/span\u003e \u003cspan class=\"hljs-title function_\"\u003elsh_hash\u003c/span\u003e(\u003cspan class=\"hljs-params\"\u003edatapoint, random_matrix\u003c/span\u003e):\n  \u003cspan class=\"hljs-string\"\u003e\u0026quot;\u0026quot;\u0026quot;\n  Hashes a datapoint using multiple random projections.\n\n\n  Args:\n      datapoint: A NumPy array representing the datapoint.\n      random_matrix: A NumPy array representing the random projection matrix.\n\n\n  Returns:\n      A list of hash values (one for each random projection vector).\n  \u0026quot;\u0026quot;\u0026quot;\u003c/span\u003e\n  hash_values = []\n  \u003cspan class=\"hljs-keyword\"\u003efor\u003c/span\u003e random_vector \u003cspan class=\"hljs-keyword\"\u003ein\u003c/span\u003e random_matrix:\n    hash_values.append(hash_function(datapoint, random_vector))\n  \u003cspan class=\"hljs-keyword\"\u003ereturn\u003c/span\u003e hash_values\n\n\u003cbutton class=\"copy-code-btn\"\u003e\u003c/button\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eThe \u003ccode\u003eish_hash\u003c/code\u003e  function hashes a data point using multiple random projections, a core step in the LSH process.\nThe first line includes the NumPy arrays \u003ccode\u003edatapoint\u003c/code\u003e and \u003ccode\u003erandom_matrix\u003c/code\u003e, which represent the datapoint to be hashed and the random projection matrix for hashing, respectively.\u003c/p\u003e\n\u003cp\u003eMoving on to the process steps, the initialization step is executed by \u003ccode\u003ehash_values\u003c/code\u003e, which creates an empty list to store the generated hash values.\u003c/p\u003e\n\u003cp\u003eThis is followed by the iteration process, which is done through random projection vectors. The random_matrix loops through each row, and then the \u003ccode\u003erandom_vector\u003c/code\u003e calls the \u003ccode\u003ehash_function\u003c/code\u003e  with the \u003ccode\u003edatapoint\u003c/code\u003e and \u003ccode\u003erandom_vector\u003c/code\u003e  as arguments.\u003c/p\u003e\n\u003cp\u003eThen you’ll get the return values in the \u003ccode\u003ehash_values\u003c/code\u003e list, containing a hash value for each random projection vector.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"language-python\"\u003e\u003cspan class=\"hljs-comment\"\u003e# Sample datapoint\u003c/span\u003e\ndatapoint = np.array([\u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e, \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e, \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e])\n\n\n\u003cspan class=\"hljs-comment\"\u003e# Number of random projections\u003c/span\u003e\nnum_projections = \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e\n\n\n\u003cspan class=\"hljs-comment\"\u003e# Dimensionality of datapoints\u003c/span\u003e\ndata_dim = \u003cspan class=\"hljs-built_in\"\u003elen\u003c/span\u003e(datapoint)\n\n\n\u003cspan class=\"hljs-comment\"\u003e# Generate random projection matrix\u003c/span\u003e\nrandom_matrix = generate_random_matrix(num_projections, data_dim)\n\n\n\u003cspan class=\"hljs-comment\"\u003e# Hash the datapoint\u003c/span\u003e\nhash_values = lsh_hash(datapoint, random_matrix)\n\n\n\u003cspan class=\"hljs-comment\"\u003e# Print the hash values\u003c/span\u003e\n\u003cspan class=\"hljs-built_in\"\u003eprint\u003c/span\u003e(\u003cspan class=\"hljs-string\"\u003e\u0026quot;LSH Hash:\u0026quot;\u003c/span\u003e, hash_values)\n\n\u003cbutton class=\"copy-code-btn\"\u003e\u003c/button\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eThis code snippet generates a sample data point. It defines the number of random projections and data dimensionality, generates a random projection matrix, hashes the data point, and prints the hash values in 1s and 0s.\u003c/p\u003e\n\u003ch2 id=\"LSH-Applications-and-Use-Cases\" class=\"common-anchor-header\"\u003eLSH Applications and Use Cases\u003cbutton data-href=\"#LSH-Applications-and-Use-Cases\" class=\"anchor-icon\" translate=\"no\"\u003e\n      \u003csvg\n        aria-hidden=\"true\"\n        focusable=\"false\"\n        height=\"20\"\n        version=\"1.1\"\n        viewBox=\"0 0 16 16\"\n        width=\"16\"\n      \u003e\n        \u003cpath\n          fill=\"#0092E4\"\n          fill-rule=\"evenodd\"\n          d=\"M4 9h1v1H4c-1.5 0-3-1.69-3-3.5S2.55 3 4 3h4c1.45 0 3 1.69 3 3.5 0 1.41-.91 2.72-2 3.25V8.59c.58-.45 1-1.27 1-2.09C10 5.22 8.98 4 8 4H4c-.98 0-2 1.22-2 2.5S3 9 4 9zm9-3h-1v1h1c1 0 2 1.22 2 2.5S13.98 12 13 12H9c-.98 0-2-1.22-2-2.5 0-.83.42-1.64 1-2.09V6.25c-1.09.53-2 1.84-2 3.25C6 11.31 7.55 13 9 13h4c1.45 0 3-1.69 3-3.5S14.5 6 13 6z\"\n        \u003e\u003c/path\u003e\n      \u003c/svg\u003e\n    \u003c/button\u003e\u003c/h2\u003e\u003cp\u003eLSH was designed to effectively and efficiently conduct similarity searches, which gives them a range of applications in various fields.\nOne of its most applied use cases is in computational biology, specifically in gene and protein sequence analysis. This is because LSH can help identify similar gene expressions in genome \u003ca href=\"https://zilliz.com/glossary/ai-database\"\u003edatabases\u003c/a\u003e, especially since gene expression data often has high dimensions.\u003c/p\u003e\n\u003cp\u003eAnother widely used application of LSH is image retrieval. the LSH function maps out high-dimensional image data to lower representations while maintaining the similarity between data. This facilitates fast retrieval of images similar to a query image. This applies to stock photo services, where users request certain visuals, medical image analysis, where finding a similar case could help with diagnosis, and more. It has also improved hashing techniques and compression performance in image retrieval applications. LSH is also used in plagiarism detection software. It helps identify the similarity between documents, often with a percentage and highlighting the similar areas. LSH has other applications, such as video retrieval, social network analysis, recommendation systems, and data mining, all owing to its ability to spot similarities between datasets.\u003c/p\u003e\n\u003ch2 id=\"Summary-of-locality-sensitive-hashing\" class=\"common-anchor-header\"\u003eSummary of locality sensitive hashing\u003cbutton data-href=\"#Summary-of-locality-sensitive-hashing\" class=\"anchor-icon\" translate=\"no\"\u003e\n      \u003csvg\n        aria-hidden=\"true\"\n        focusable=\"false\"\n        height=\"20\"\n        version=\"1.1\"\n        viewBox=\"0 0 16 16\"\n        width=\"16\"\n      \u003e\n        \u003cpath\n          fill=\"#0092E4\"\n          fill-rule=\"evenodd\"\n          d=\"M4 9h1v1H4c-1.5 0-3-1.69-3-3.5S2.55 3 4 3h4c1.45 0 3 1.69 3 3.5 0 1.41-.91 2.72-2 3.25V8.59c.58-.45 1-1.27 1-2.09C10 5.22 8.98 4 8 4H4c-.98 0-2 1.22-2 2.5S3 9 4 9zm9-3h-1v1h1c1 0 2 1.22 2 2.5S13.98 12 13 12H9c-.98 0-2-1.22-2-2.5 0-.83.42-1.64 1-2.09V6.25c-1.09.53-2 1.84-2 3.25C6 11.31 7.55 13 9 13h4c1.45 0 3-1.69 3-3.5S14.5 6 13 6z\"\n        \u003e\u003c/path\u003e\n      \u003c/svg\u003e\n    \u003c/button\u003e\u003c/h2\u003e\u003cp\u003eLocal Sensitivity Hashing (LSH) is a pivotal technique for tackling the complexities of large, high-dimensional datasets, streamlining the process of similarity search and data retrieval. Its capacity to efficiently map similar data points to the same 'buckets' in a reduced-dimensional search space, makes it an invaluable tool in various sectors. From powering recommendation systems in e-commerce to facilitating advanced research in computational biology, LSH's role in enhancing search efficiency and accuracy is undeniable.\u003c/p\u003e\n","url":"Local-Sensitivity-Hashing-A-Comprehensive-Guide","codeList":["import numpy as np\n\n","def hash_function(datapoint, random_vector):\n  \"\"\"\n  Hashes a datapoint using a random projection vector.\n\n\n  Args:\n      datapoint: A NumPy array representing the datapoint.\n      random_vector: A NumPy array representing the random projection vector.\n\n\n  Returns:\n      A single-bit hash value (0 or 1).\n  \"\"\"\n  projection = np.dot(datapoint, random_vector)\n  return 1 if projection \u003e= 0 else 0\n","def generate_random_matrix(num_projections, data_dim):\n/*\n  Generates a random projection matrix with specified dimensions.\n\n\n  Args:\n      num_projections: Number of random projection vectors to generate.\n      data_dim: Dimensionality of the datapoints.\n\n\n  Returns:\n      A NumPy array representing the random projection matrix.\n*/\n  return np.random.randn(num_projections, data_dim)\n\n","def lsh_hash(datapoint, random_matrix):\n  \"\"\"\n  Hashes a datapoint using multiple random projections.\n\n\n  Args:\n      datapoint: A NumPy array representing the datapoint.\n      random_matrix: A NumPy array representing the random projection matrix.\n\n\n  Returns:\n      A list of hash values (one for each random projection vector).\n  \"\"\"\n  hash_values = []\n  for random_vector in random_matrix:\n    hash_values.append(hash_function(datapoint, random_vector))\n  return hash_values\n\n","# Sample datapoint\ndatapoint = np.array([1, 2, 3])\n\n\n# Number of random projections\nnum_projections = 2\n\n\n# Dimensionality of datapoints\ndata_dim = len(datapoint)\n\n\n# Generate random projection matrix\nrandom_matrix = generate_random_matrix(num_projections, data_dim)\n\n\n# Hash the datapoint\nhash_values = lsh_hash(datapoint, random_matrix)\n\n\n# Print the hash values\nprint(\"LSH Hash:\", hash_values)\n\n"],"image":{"id":3477,"name":"May 11 ——Locality-Sensitive Hashing (LSH)_ A Comprehensive Guide (1).png","alternativeText":"","caption":"","width":2401,"height":1256,"for
